# git-cliff configuration — generates CHANGELOG.md from Conventional Commits.
# Output mirrors Keep a Changelog so ito/help.rs can include_str! it unchanged.

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
footer = """
{% for release in releases -%}
    {% if release.version -%}
        {% if release.previous.version -%}
[{{ release.version | trim_start_matches(pat="v") }}]: https://github.com/denfren/ito/compare/{{ release.previous.version }}...{{ release.version }}
        {% else -%}
[{{ release.version | trim_start_matches(pat="v") }}]: https://github.com/denfren/ito/releases/tag/{{ release.version }}
        {% endif -%}
    {% else -%}
[Unreleased]: https://github.com/denfren/ito/compare/{{ release.previous.version }}...HEAD
    {% endif -%}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^docs", group = "Documentation" },
    { message = "^refactor", skip = true },
    { message = "^test", skip = true },
    { message = "^chore", skip = true },
]
filter_commits = true
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
